<!-- persona-form.component.html -->
<div class="form-container">
  <h2>{{ modoEditar() ? 'Editar persona' : 'Nueva persona' }}</h2>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  <div class="form-group">
    <label>Nombre *</label>
    <input
      [ngModel]="form().nombre"
      (ngModelChange)="form.update(f=>({...f,nombre:$event}))"
      placeholder="Nombre"
    />
  </div>
  <div class="form-group">
    <label>Apellido *</label>
    <input
      [ngModel]="form().apellido"
      (ngModelChange)="form.update(f=>({...f,apellido:$event}))"
      placeholder="Apellido"
    />
  </div>
  <div class="form-group">
    <label>Email</label>
    <input
      type="email"
      [ngModel]="form().email"
      (ngModelChange)="form.update(f=>({...f,email:$event}))"
      placeholder="correo@ejemplo.com"
    />
  </div>
  <div class="form-group">
    <label>Edad</label>
    <input
      type="number"
      [ngModel]="form().edad"
      (ngModelChange)="form.update(f=>({...f,edad:$event}))"
      placeholder="Edad"
      min="0"
      max="120"
    />
  </div>
  <div class="form-actions">
    <button class="btn-guardar" (click)="guardar()" [disabled]="cargando()">
      {{ cargando() ? 'Guardando...' : 'Guardar' }}
    </button>
    <a class="btn-cancelar" routerLink="/personas">Cancelar</a>
  </div>
</div>
